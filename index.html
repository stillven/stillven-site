<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>stillven</title>
  <meta name="description" content="A frame-pacing instrument that measures what it changes — and shows its work, every run. Sealed until the results earn more." />
  <meta name="theme-color" content="#14151A" />
  <link rel="canonical" href="https://stillven.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stillven.com" />
  <meta property="og:title" content="stillven" />
  <meta property="og:description" content="A frame-pacing instrument that measures what it changes — and shows its work, every run. Sealed until the results earn more." />
  <meta property="og:image" content="https://stillven.com/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="stillven — proof, or nothing." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://stillven.com/og.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 5 L53 13 V31 C53 45 44 54 32 59 C20 54 11 45 11 31 V13 Z' fill='none' stroke='%238A92A6' stroke-width='2.5'/%3E%3Cpath d='M16 34 H27 l3 -9 l3.5 17 l3 -8 H48' fill='none' stroke='%235CC2AC' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #14151A;
      --parchment: #E9E4D8;
      --teal: #5CC2AC;
      --muted: #8A92A6;
      --faint: #6B7285; /* SV-114 (tD): nudged from #5A6173 — 4.6:1 on ink, clears WCAG AA small-text; still clearly the faintest tier */
      --hairline: #23252E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--ink);
      /* faint center-raise: surface tone lifts where the mark sits, no shadow */
      background-image: radial-gradient(120% 90% at 50% 42%, #181A20 0%, #14151A 60%, #111217 100%);
      color: var(--parchment);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px 0;
      overflow: hidden;
    }
    /* optically lift the column slightly above true center */
    main { transform: translateY(-5vh); max-width: 600px; }

    .mark { width: 54px; height: 54px; display: block; margin: 0 auto 26px; }
    .mark .ekg-base { opacity: 0.25; }
    .mark .ekg-pulse {
      stroke-dasharray: 100;
      animation: ekgbeat 2600ms ease-in-out infinite;
    }
    @keyframes ekgbeat {
      0%   { stroke-dashoffset: 100; opacity: 1; }
      38%  { stroke-dashoffset: 0;   opacity: 1; }
      58%  { stroke-dashoffset: 0;   opacity: 1; }
      78%  { stroke-dashoffset: 0;   opacity: 0; }
      79%  { stroke-dashoffset: 100; opacity: 0; }
      100% { stroke-dashoffset: 100; opacity: 0; }
    }

    .wordmark {
      font-size: clamp(44px, 9vw, 62px);
      font-weight: 500;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .wordmark .still { color: var(--parchment); }
    .wordmark .ven { color: var(--teal); }

    .headline {
      margin-top: 30px;
      font-size: clamp(19px, 3.2vw, 23px);
      font-weight: 400;
      color: var(--parchment);
      letter-spacing: 0.2px;
    }
    .sub {
      margin: 14px auto 0;
      max-width: 30em;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .sealed { margin-top: 40px; }
    .sealed .lock {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
    .sealed .sub-lock {
      margin-top: 6px;
      font-size: 12.5px;
      color: var(--faint);
      letter-spacing: 0.2px;
    }

    .watch {
      display: inline-flex;
      align-items: baseline;
      gap: 0.4em;
      margin-top: 30px;
      font-size: 13.5px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid rgba(138, 146, 166, 0.4);
      padding-bottom: 2px;
      transition: color 320ms ease, border-color 320ms ease;
    }
    .watch::after {
      content: "\2197";
      font-size: 0.9em;
      transition: transform 320ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .watch:hover, .watch:focus-visible {
      color: var(--parchment);
      border-bottom-color: rgba(233, 228, 216, 0.6);
      outline: none;
    }
    .watch:hover::after, .watch:focus-visible::after { transform: translateX(3px); }
    .watch:focus-visible { outline: 1px solid rgba(233, 228, 216, 0.5); outline-offset: 4px; }

    footer {
      position: fixed;
      bottom: 22px;
      left: 0; right: 0;
      text-align: center;
    }
    footer .token {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--faint);
    }
    /* live idle indicator — phase-locked to the mark's 2600ms heartbeat so the page breathes head to foot.
       Floats between faint and soft (never neon): the instrument is awake, but waiting. */
    footer .token .pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--teal);
      animation: pip 2600ms ease-in-out infinite;
    }
    @keyframes pip {
      0%, 30% { opacity: 0.22; }
      38%     { opacity: 0.9; }
      58%     { opacity: 0.9; }
      75%     { opacity: 0.22; }
      100%    { opacity: 0.22; }
    }

    @media (prefers-reduced-motion: reduce) {
      .mark .ekg-pulse { display: none; }
      .mark .ekg-base { opacity: 1; }
      footer .token .pip { animation: none; opacity: 0.5; }
    }
  </style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 64 64" role="img" aria-label="stillven mark — a shield with a steady heartbeat trace">
      <path d="M32 5 L53 13 V31 C53 45 44 54 32 59 C20 54 11 45 11 31 V13 Z"
            fill="none" stroke="#8A92A6" stroke-width="2.5" stroke-linejoin="round" />
      <path class="ekg-base" pathLength="100" d="M16 34 H27 l3 -9 l3.5 17 l3 -8 H48"
            fill="none" stroke="#5CC2AC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      <path class="ekg-pulse" pathLength="100" d="M16 34 H27 l3 -9 l3.5 17 l3 -8 H48"
            fill="none" stroke="#5CC2AC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>

    <h1 class="wordmark"><span class="still">still</span><span class="ven">ven</span></h1>

    <p class="headline">Proof, or nothing.</p>
    <p class="sub">A frame-pacing instrument that measures what it changes — and shows its work, every run.</p>

    <div class="sealed">
      <div class="lock">Sealed until the results earn more.</div>
      <div class="sub-lock">The seal comes off when the evidence does.</div>
    </div>

    <a class="watch" href="https://github.com/stillven/stillven-site" target="_blank" rel="noopener noreferrer">Watch the repo to be here when the seal comes off</a>
  </main>

  <footer>
    <span class="token"><span class="pip" aria-hidden="true"></span>state: sealed<span class="pip" aria-hidden="true"></span></span>
  </footer>

  <script>
    // For the ones who open the console — a builder's handshake. Restates only what the page already says.
    console.log(
      "%cstillven%c  state: sealed\n%cMeasures what it changes. Shows its work, every run.\nWatch the repo to be here when the seal comes off:\nhttps://github.com/stillven/stillven-site",
      "color:#5CC2AC;font:600 15px 'IBM Plex Mono',monospace",
      "color:#8A92A6;font:400 12px 'IBM Plex Mono',monospace",
      "color:#5A6173;font:400 11px 'IBM Plex Mono',monospace"
    );
  </script>
</body>
</html>
